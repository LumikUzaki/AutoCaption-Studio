<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legendas Pro - Transcrição e Edição Profissional</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Ícones (opcional, usando CDN para Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Barra Lateral de Navegação -->
    <aside id="sidebar" class="sidebar">
        <div class="logo">
            <i class="ph ph-closed-captioning"></i>
            <h1>Legendas Pro</h1>
        </div>
        <nav id="main-nav">
            <!-- Itens de navegação injetados via JS -->
        </nav>
        <div class="sidebar-footer">
            <small>v1.0.0</small>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main id="app-container" class="main-content">
        <!-- Header Mobile / Topo -->
        <header class="top-bar">
            <button id="menu-toggle" class="btn-icon"><i class="ph ph-list"></i></button>
            <h2 id="page-title">Dashboard</h2>
            <div class="user-info">
                <span id="connection-status" class="status-dot"></span>
            </div>
        </header>

        <!-- Área de Renderização das Páginas -->
        <div id="page-content" class="content-area">
            <!-- O conteúdo das páginas será injetado aqui dinamicamente -->
            <div class="loading-screen">
                <i class="ph ph-spinner ph-spin"></i>
                <p>Carregando aplicação...</p>
            </div>
        </div>
    </main>

    <!-- Modal Genérico -->
    <dialog id="modal-generic" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Título</h3>
                <button class="btn-icon close-modal"><i class="ph ph-x"></i></button>
            </header>
            <div id="modal-body" class="modal-body"></div>
            <footer id="modal-footer" class="modal-footer"></footer>
        </div>
    </dialog>

    <!-- Scripts da Aplicação -->
    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/layout.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
